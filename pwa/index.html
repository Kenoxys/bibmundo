<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#005a9c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BibMundo">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Biblioteca Mundo Hispano - Catálogo de recursos bíblicos en español. Funciona offline como PWA.">
  <title>Biblioteca Mundo Hispano</title>

  <!-- PDF.js para visualizar PDFs (modo offline) -->
  <script src="./lib/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = './lib/pdf.worker.min.js';</script>

  <!-- Manifest PWA -->
  <link rel="manifest" href="./manifest.json">
  
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="96x96" href="./icons/favicon-96x96.png">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
  
  <!-- Apple Touch Icon (iOS) -->
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  
  <!-- Estilos -->
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📚</span>
        <div>
          <h1>Biblioteca Mundo Hispano</h1>
          <p class="subtitle">Lectura offline + recursos bíblicos</p>
        </div>
      </div>
      <button id="btn-install" class="btn-primary" hidden>Instalar</button>
    </div>
  </header>

  <main class="app-main" id="app">
    <!-- Vista Principal: Categorías y Búsqueda -->
    <section class="section" id="home">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Buscar por nombre..." autocomplete="off">
        <button id="show-all" class="btn-clear" hidden>Ver todas</button>
      </div>

      <div id="category-title" class="category-title" hidden></div>

      <div class="intro">
        <strong>Bienvenido</strong> a la Biblioteca Mundo Hispano.
        <p>Selecciona una categoría o busca por nombre para ver los recursos disponibles.</p>
      </div>

      <div id="categories" class="cards"></div>

      <div id="results" class="cards" hidden></div>
    </section>

    <!-- Vista del Lector PDF -->
    <section class="section" id="reader" hidden>
      <div class="reader-header">
        <button id="back" class="btn-link">← Atrás</button>
        <h2 id="readerTitle" class="reader-title"></h2>
      </div>
      
      <!-- Contenedor del visor PDF.js -->
      <div class="reader-content">
        <div id="readerDesc" class="reader-desc"></div>
        <div id="pdf-container" class="pdf-container">
          <canvas id="pdf-canvas"></canvas>
        </div>
        <div id="pdf-controls" class="pdf-controls" hidden>
          <button id="prev-page" class="btn-pdf">← Anterior</button>
          <span id="page-num" class="page-num">Página 1</span>
          <button id="next-page" class="btn-pdf">Siguiente →</button>
        </div>
        <div id="pdf-loading" class="pdf-loading">Cargando PDF...</div>
        <div id="pdf-error" class="pdf-error" hidden>Error al cargar el PDF</div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <span>Funciona offline. Usa el botón "Instalar" si está disponible.</span>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
